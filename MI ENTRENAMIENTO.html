<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Entrenamiento Semanal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0d;
            --surface: #1a1a1a;
            --surface2: #232323;
            --border: rgba(255, 255, 255, 0.08);
            --text: #f0f0f0;
            --muted: #888;
            --blue: #3b82f6;
            --green: #22c55e;
            --red: #ef4444;
            --yellow: #f59e0b;
            --purple: #a855f7;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* HEADER */
        header {
            padding: 1.5rem 2rem;
            background: linear-gradient(135deg, #1a1a2e 0%, #0d0d0d 100%);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .header-left h1 {
            font-size: 1.7rem;
            font-weight: 900;
            background: linear-gradient(90deg, #3b82f6, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-left p {
            color: var(--muted);
            font-size: 0.85rem;
            margin-top: 0.2rem;
        }

        .btn-edit-mode {
            padding: 0.6rem 1.3rem;
            border-radius: 50px;
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-edit-mode:hover {
            border-color: var(--blue);
            color: var(--blue);
        }

        .btn-edit-mode.active {
            background: var(--yellow);
            color: #000;
            border-color: var(--yellow);
        }

        /* TABS */
        .weekday-tabs {
            display: flex;
            gap: 0.5rem;
            overflow-x: auto;
            padding: 1.2rem 1.5rem 0;
            scrollbar-width: none;
        }

        .weekday-tabs::-webkit-scrollbar {
            display: none;
        }

        .tab-btn {
            flex-shrink: 0;
            padding: 0.55rem 1.1rem;
            border: 1px solid var(--border);
            border-radius: 50px;
            background: var(--surface);
            color: var(--muted);
            font-family: 'Inter', sans-serif;
            font-size: 0.82rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .tab-btn.active {
            background: var(--blue);
            color: #fff;
            border-color: var(--blue);
        }

        .tab-btn.today::after {
            content: '';
            position: absolute;
            top: -3px;
            right: -3px;
            width: 8px;
            height: 8px;
            background: var(--green);
            border-radius: 50%;
        }

        /* MAIN */
        .main {
            padding: 1.5rem;
            max-width: 950px;
            margin: 0 auto;
        }

        .day-panel {
            display: none;
        }

        .day-panel.active {
            display: block;
        }

        /* DAY HEADER */
        .day-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 1.5rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            margin-bottom: 1.2rem;
        }

        .day-icon {
            font-size: 2rem;
        }

        .day-title {
            font-size: 1.3rem;
            font-weight: 800;
        }

        .day-focus-label {
            font-size: 0.8rem;
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .day-focus-input {
            background: transparent;
            border: none;
            border-bottom: 1px dashed var(--border);
            color: var(--muted);
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            width: 160px;
            outline: none;
            padding: 0 2px;
        }

        .day-focus-input:focus {
            border-bottom-color: var(--blue);
            color: var(--text);
        }

        /* PROGRESS */
        .progress-box {
            margin-bottom: 1.2rem;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.78rem;
            color: var(--muted);
            margin-bottom: 0.4rem;
        }

        .progress-bar {
            height: 5px;
            border-radius: 3px;
            background: var(--surface2);
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 3px;
            background: linear-gradient(90deg, #3b82f6, #a855f7);
            transition: width 0.4s ease;
        }

        /* EXERCISES GRID */
        .exercises-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1rem;
        }

        /* EXERCISE CARD */
        .exercise-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem 1.1rem;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            transition: transform 0.2s, border-color 0.2s;
            cursor: pointer;
        }

        .exercise-card:hover {
            transform: translateY(-2px);
            border-color: rgba(59, 130, 246, 0.4);
        }

        .exercise-card.done {
            border-color: var(--green);
            background: rgba(34, 197, 94, 0.05);
        }

        .exercise-card.done .ex-name {
            text-decoration: line-through;
            opacity: 0.6;
        }

        .ex-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 0.5rem;
        }

        .ex-name {
            font-weight: 700;
            font-size: 0.95rem;
            line-height: 1.3;
        }

        .check-circle {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid var(--border);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            transition: all 0.2s;
        }

        .exercise-card.done .check-circle {
            background: var(--green);
            border-color: var(--green);
            color: #fff;
        }

        .ex-meta {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
        }

        .badge {
            padding: 0.22rem 0.6rem;
            border-radius: 50px;
            font-size: 0.72rem;
            font-weight: 600;
        }

        .b-sets {
            background: rgba(59, 130, 246, 0.15);
            color: #60a5fa;
        }

        .b-reps {
            background: rgba(168, 85, 247, 0.15);
            color: #c084fc;
        }

        .b-rest {
            background: rgba(107, 114, 128, 0.15);
            color: #9ca3af;
        }

        .ex-note {
            font-size: 0.78rem;
            color: var(--muted);
            line-height: 1.5;
        }

        /* EDIT OVERLAY (on card) */
        .card-edit-btns {
            display: flex;
            gap: 0.5rem;
            justify-content: flex-end;
            border-top: 1px solid var(--border);
            padding-top: 0.6rem;
        }

        .btn-sm {
            padding: 0.3rem 0.7rem;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn-sm.danger {
            color: var(--red);
            border-color: rgba(239, 68, 68, 0.3);
        }

        .btn-sm.danger:hover {
            background: rgba(239, 68, 68, 0.1);
        }

        .btn-sm.primary {
            color: var(--blue);
            border-color: rgba(59, 130, 246, 0.3);
        }

        .btn-sm.primary:hover {
            background: rgba(59, 130, 246, 0.1);
        }

        /* ADD EXERCISE BUTTON */
        .btn-add-exercise {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 1rem;
            background: transparent;
            border: 2px dashed var(--border);
            border-radius: 12px;
            color: var(--muted);
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }

        .btn-add-exercise:hover {
            border-color: var(--blue);
            color: var(--blue);
        }

        /* MODAL */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal {
            background: #1a1a1a;
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 2rem;
            width: 100%;
            max-width: 480px;
        }

        .modal h2 {
            font-size: 1.2rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            margin-bottom: 1.1rem;
        }

        .form-group label {
            font-size: 0.8rem;
            color: var(--muted);
            font-weight: 600;
        }

        .form-group input,
        .form-group textarea {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.7rem 0.9rem;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            outline: none;
            width: 100%;
            transition: border-color 0.2s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: var(--blue);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 0.75rem;
        }

        .modal-actions {
            display: flex;
            gap: 0.75rem;
            justify-content: flex-end;
            margin-top: 1.5rem;
        }

        .btn-primary {
            padding: 0.7rem 1.5rem;
            background: var(--blue);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: 0.2s;
        }

        .btn-primary:hover {
            background: #2563eb;
        }

        .btn-cancel {
            padding: 0.7rem 1.2rem;
            background: var(--surface2);
            color: var(--muted);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
        }

        /* REST DAY */
        .rest-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 4rem 1rem;
            gap: 1rem;
        }

        .rest-panel .rest-emoji {
            font-size: 5rem;
        }

        .rest-panel h2 {
            font-size: 2rem;
            font-weight: 800;
            color: var(--muted);
        }

        .rest-panel p {
            color: var(--muted);
            max-width: 360px;
            line-height: 1.6;
        }
    </style>
</head>

<body>

    <header>
        <div class="header-left">
            <h1>💪 Mi Entrenamiento</h1>
            <p id="dateStr">Cargando...</p>
        </div>
        <button class="btn-edit-mode" id="editModeBtn" onclick="toggleEditMode()">✏️ Editar Rutina</button>
    </header>

    <div class="weekday-tabs" id="tabsContainer"></div>
    <div class="main" id="mainContent"></div>

    <!-- Modal para añadir/editar ejercicio -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <h2 id="modalTitle">➕ Añadir Ejercicio</h2>
            <div class="form-group">
                <label>Nombre del ejercicio *</label>
                <input type="text" id="fName" placeholder="Ej: Press de Banca">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Series</label>
                    <input type="number" id="fSets" placeholder="4" min="1" max="20">
                </div>
                <div class="form-group">
                    <label>Reps / Tiempo</label>
                    <input type="text" id="fReps" placeholder="8-10 / 45s">
                </div>
                <div class="form-group">
                    <label>Descanso</label>
                    <input type="text" id="fRest" placeholder="90s">
                </div>
            </div>
            <div class="form-group">
                <label>Nota o consejo (opcional)</label>
                <textarea id="fNote" rows="3" placeholder="Ej: Controla la bajada, codos a 45°..."></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
                <button class="btn-primary" onclick="saveExercise()">Guardar</button>
            </div>
        </div>
    </div>

    <script>
        // ─── DEFAULT DATA: Sistema Pecho / Pierna / Espalda ───────────────────────────
        const DEFAULT_PLAN = {
            lunes: {
                icon: '🔥', focus: 'Pecho + Tríceps', exercises: [
                    { name: 'Press de Banca (Barra)', sets: 4, reps: '8-10', rest: '90s', note: 'Agarre más ancho que hombros. Controla la bajada.' },
                    { name: 'Press Inclinado Mancuernas', sets: 3, reps: '10-12', rest: '75s', note: 'Ángulo 30-45°. Siente el estiramiento en pecho.' },
                    { name: 'Aperturas en Polea', sets: 3, reps: '12-15', rest: '60s', note: 'Movimiento semicircular. Squeeze en el centro.' },
                    { name: 'Press Francés (Z-Bar)', sets: 3, reps: '10-12', rest: '60s', note: 'Codos fijos, no los abras.' },
                    { name: 'Extensiones Tríceps Polea', sets: 3, reps: '12-15', rest: '60s', note: 'Extiende con control, codos quietos.' }
                ]
            },
            martes: {
                icon: '🦵', focus: 'Piernas – Cuádriceps', exercises: [
                    { name: 'Sentadilla con Barra', sets: 4, reps: '8-10', rest: '120s', note: 'Espalda recta, desciende hasta 90°.' },
                    { name: 'Prensa de Piernas', sets: 4, reps: '10-12', rest: '90s', note: 'Pies a anchura de hombros. No bloquees rodillas.' },
                    { name: 'Extensiones de Cuádriceps', sets: 3, reps: '12-15', rest: '60s', note: 'Aguanta 1 segundo arriba.' },
                    { name: 'Zancada con Mancuernas', sets: 3, reps: '10 cada p.', rest: '75s', note: 'Rodilla delantera no supera la punta del pie.' },
                    { name: 'Elevación de Gemelos', sets: 4, reps: '15-20', rest: '45s', note: 'Máximo recorrido. Controla la bajada.' }
                ]
            },
            miercoles: {
                icon: '🏋️', focus: 'Espalda + Bíceps', exercises: [
                    { name: 'Dominadas (Agarre Supino)', sets: 4, reps: 'Al fallo', rest: '90s', note: 'Si no puedes, usa máquina asistida.' },
                    { name: 'Remo con Barra', sets: 4, reps: '8-10', rest: '90s', note: 'Tira hacia el ombligo, espalda neutra.' },
                    { name: 'Jalón al Pecho Polea', sets: 3, reps: '10-12', rest: '75s', note: 'Tira con codos, no con manos. Toca el pecho.' },
                    { name: 'Curl de Bíceps Barra', sets: 3, reps: '10-12', rest: '60s', note: 'Codos pegados. No balancees el torso.' },
                    { name: 'Curl Martillo Mancuernas', sets: 3, reps: '12-15', rest: '60s', note: 'Agarre neutro. Trabaja antebrazo y bíceps.' }
                ]
            },
            jueves: {
                icon: '🔄', focus: 'Pecho + Tríceps (Variante)', exercises: [
                    { name: 'Press de Banca con Mancuernas', sets: 4, reps: '8-10', rest: '90s', note: 'Mayor rango de movimiento que la barra.' },
                    { name: 'Fondos en Paralelas', sets: 3, reps: 'Al fallo', rest: '75s', note: 'Inclínate para activar el pecho.' },
                    { name: 'Pullover con Mancuerna', sets: 3, reps: '12-15', rest: '60s', note: 'Abre el pecho y trabaja serrato.' },
                    { name: 'Patada de Tríceps', sets: 3, reps: '12-15', rest: '60s', note: 'Codo quieto, extiende el antebrazo.' },
                    { name: 'Triceps Polea (Agarre Invertido)', sets: 3, reps: '12-15', rest: '60s', note: 'Cambia ángulo de ataque.' }
                ]
            },
            viernes: {
                icon: '🦶', focus: 'Piernas – Isquios + Glúteos', exercises: [
                    { name: 'Peso Muerto Rumano', sets: 4, reps: '10-12', rest: '90s', note: 'Siente el estiramiento de isquios. Espalda neutra.' },
                    { name: 'Curl de Pierna Tumbado', sets: 3, reps: '12-15', rest: '60s', note: 'Completa el recorrido y aguanta arriba.' },
                    { name: 'Hip Thrust con Barra', sets: 4, reps: '12-15', rest: '75s', note: 'Empuja con glúteos, no con espalda baja.' },
                    { name: 'Sentadilla Búlgara', sets: 3, reps: '10 cada p.', rest: '75s', note: 'Pierna atrasada en banco.' },
                    { name: 'Abducción de Cadera Máquina', sets: 3, reps: '15-20', rest: '45s', note: 'Controlado. Activa glúteo medio.' }
                ]
            },
            sabado: {
                icon: '🏃', focus: 'Cardio + Core', exercises: [
                    { name: 'Carrera 30-40 min', sets: 1, reps: '1 sesión', rest: '-', note: 'Intensidad media, FC 130-150 ppm.' },
                    { name: 'Plancha Frontal', sets: 3, reps: '45-60s', rest: '45s', note: 'Cuerpo recto, evita caída de caderas.' },
                    { name: 'Crunch en Rueda', sets: 3, reps: '10-12', rest: '60s', note: 'Desde rodillas si no controlas la lumbar.' },
                    { name: 'Mountain Climbers', sets: 3, reps: '20 alt.', rest: '45s', note: 'Caderas niveladas.' }
                ]
            },
            domingo: { icon: '🛌', focus: 'Descanso', isRest: true, exercises: [] }
        };

        const DAY_KEYS = ['lunes', 'martes', 'miercoles', 'jueves', 'viernes', 'sabado', 'domingo'];
        const DAY_LABELS = { lunes: 'LUN', martes: 'MAR', miercoles: 'MIÉ', jueves: 'JUE', viernes: 'VIE', sabado: 'SÁB', domingo: 'DOM' };
        const DAY_NAMES = { lunes: 'Lunes', martes: 'Martes', miercoles: 'Miércoles', jueves: 'Jueves', viernes: 'Viernes', sabado: 'Sábado', domingo: 'Domingo' };
        const JS_TO_KEY = ['domingo', 'lunes', 'martes', 'miercoles', 'jueves', 'viernes', 'sabado'];

        // ─── STATE ────────────────────────────────────────────────────────────────────
        let plan = JSON.parse(localStorage.getItem('plan_v2') || 'null') || structuredClone(DEFAULT_PLAN);
        let progress = JSON.parse(localStorage.getItem('progress_v2') || '{}');
        let editMode = false;
        let activeDay = JS_TO_KEY[new Date().getDay()];
        let modalCtx = null; // { dayId, exIdx } — null = new exercise

        // ─── PERSIST ──────────────────────────────────────────────────────────────────
        function save() {
            localStorage.setItem('plan_v2', JSON.stringify(plan));
            localStorage.setItem('progress_v2', JSON.stringify(progress));
        }

        // ─── RENDER ───────────────────────────────────────────────────────────────────
        function render() {
            const tabs = document.getElementById('tabsContainer');
            const main = document.getElementById('mainContent');
            tabs.innerHTML = '';
            main.innerHTML = '';

            DAY_KEYS.forEach(dayId => {
                const day = plan[dayId];
                const isToday = dayId === JS_TO_KEY[new Date().getDay()];

                // TAB
                const btn = document.createElement('button');
                btn.className = 'tab-btn' + (dayId === activeDay ? ' active' : '') + (isToday ? ' today' : '');
                btn.textContent = DAY_LABELS[dayId];
                btn.onclick = () => { activeDay = dayId; renderPanel(); updateTabs(); };
                tabs.appendChild(btn);
            });

            renderPanel();
        }

        function updateTabs() {
            document.querySelectorAll('.tab-btn').forEach((btn, i) => {
                btn.classList.toggle('active', DAY_KEYS[i] === activeDay);
            });
        }

        function renderPanel() {
            const main = document.getElementById('mainContent');
            main.innerHTML = '';
            const dayId = activeDay;
            const day = plan[dayId];
            const panel = document.createElement('div');

            if (day.isRest) {
                panel.innerHTML = `
            <div class="rest-panel">
                <div class="rest-emoji">😴</div>
                <h2>Día de Descanso</h2>
                <p>Recupera. Hidrátate bien y duerme suficiente. El descanso es parte del entrenamiento.</p>
            </div>`;
                main.appendChild(panel);
                return;
            }

            const exercises = day.exercises || [];
            const doneCount = exercises.filter((_, i) => progress[dayId + '_' + i]).length;
            const total = exercises.length;
            const pct = total ? Math.round(doneCount / total * 100) : 0;

            // DAY HEADER
            const header = document.createElement('div');
            header.className = 'day-header';
            header.innerHTML = `
        <span class="day-icon">${day.icon}</span>
        <div>
            <div class="day-title">${DAY_NAMES[dayId]}</div>
            <div class="day-focus-label">
                ${editMode
                    ? `<input class="day-focus-input" id="focusInput_${dayId}" value="${day.focus}" placeholder="Tipo de entrenamiento..." onchange="updateFocus('${dayId}', this.value)">`
                    : `<span>${day.focus}</span>`
                }
            </div>
        </div>`;
            panel.appendChild(header);

            // PROGRESS
            const pb = document.createElement('div');
            pb.className = 'progress-box';
            pb.innerHTML = `
        <div class="progress-label">
            <span>Progreso del día</span>
            <span>${doneCount} / ${total} · ${pct}%</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>`;
            panel.appendChild(pb);

            // EXERCISES GRID
            const grid = document.createElement('div');
            grid.className = 'exercises-grid';

            exercises.forEach((ex, i) => {
                const done = !!progress[dayId + '_' + i];
                const card = document.createElement('div');
                card.className = 'exercise-card' + (done ? ' done' : '');
                if (!editMode) {
                    card.onclick = () => toggleDone(dayId, i);
                }
                let metaHtml = '';
                if (ex.sets) metaHtml += `<span class="badge b-sets">📋 ${ex.sets} series</span>`;
                if (ex.reps) metaHtml += `<span class="badge b-reps">🔁 ${ex.reps}</span>`;
                if (ex.rest && ex.rest !== '-') metaHtml += `<span class="badge b-rest">⏸ ${ex.rest}</span>`;

                card.innerHTML = `
            <div class="ex-top">
                <div class="ex-name">${ex.name}</div>
                ${!editMode ? `<div class="check-circle">${done ? '✓' : ''}</div>` : ''}
            </div>
            ${metaHtml ? `<div class="ex-meta">${metaHtml}</div>` : ''}
            ${ex.note ? `<div class="ex-note">💡 ${ex.note}</div>` : ''}
            ${editMode ? `
            <div class="card-edit-btns">
                <button class="btn-sm primary" onclick="openModal('${dayId}',${i})">✏️ Editar</button>
                <button class="btn-sm danger"  onclick="deleteExercise('${dayId}',${i})">🗑 Borrar</button>
            </div>` : ''}`;
                grid.appendChild(card);
            });

            // ADD BUTTON (edit mode only)
            if (editMode) {
                const addBtn = document.createElement('button');
                addBtn.className = 'btn-add-exercise';
                addBtn.innerHTML = '➕ Añadir Ejercicio';
                addBtn.onclick = () => openModal(dayId, null);
                grid.appendChild(addBtn);
            }

            panel.appendChild(grid);
            main.appendChild(panel);
        }

        // ─── INTERACTIONS ─────────────────────────────────────────────────────────────
        function toggleDone(dayId, idx) {
            const key = dayId + '_' + idx;
            progress[key] = !progress[key];
            save();
            renderPanel();
        }

        function updateFocus(dayId, value) {
            plan[dayId].focus = value;
            save();
        }

        function toggleEditMode() {
            editMode = !editMode;
            const btn = document.getElementById('editModeBtn');
            btn.classList.toggle('active', editMode);
            btn.textContent = editMode ? '✅ Guardar Rutina' : '✏️ Editar Rutina';
            renderPanel();
        }

        function deleteExercise(dayId, idx) {
            if (!confirm('¿Eliminar este ejercicio?')) return;
            plan[dayId].exercises.splice(idx, 1);
            // Fix progress keys
            const newProgress = {};
            Object.keys(progress).forEach(k => {
                const [d, i] = k.split('_');
                const numI = parseInt(i);
                if (d !== dayId) { newProgress[k] = progress[k]; return; }
                if (numI < idx) { newProgress[k] = progress[k]; return; }
                if (numI > idx) { newProgress[d + '_' + (numI - 1)] = progress[k]; }
            });
            progress = newProgress;
            save();
            renderPanel();
        }

        // ─── MODAL ────────────────────────────────────────────────────────────────────
        function openModal(dayId, exIdx) {
            modalCtx = { dayId, exIdx };
            const isEdit = exIdx !== null;
            document.getElementById('modalTitle').textContent = isEdit ? '✏️ Editar Ejercicio' : '➕ Añadir Ejercicio';
            const ex = isEdit ? plan[dayId].exercises[exIdx] : {};
            document.getElementById('fName').value = ex.name || '';
            document.getElementById('fSets').value = ex.sets ?? '';
            document.getElementById('fReps').value = ex.reps || '';
            document.getElementById('fRest').value = ex.rest || '';
            document.getElementById('fNote').value = ex.note || '';
            document.getElementById('modal').classList.add('open');
            document.getElementById('fName').focus();
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('open');
            modalCtx = null;
        }

        function saveExercise() {
            const name = document.getElementById('fName').value.trim();
            if (!name) { alert('El nombre es obligatorio'); return; }
            const ex = {
                name,
                sets: parseInt(document.getElementById('fSets').value) || null,
                reps: document.getElementById('fReps').value.trim() || null,
                rest: document.getElementById('fRest').value.trim() || null,
                note: document.getElementById('fNote').value.trim() || null,
            };
            const { dayId, exIdx } = modalCtx;
            if (exIdx !== null) {
                plan[dayId].exercises[exIdx] = ex;
            } else {
                plan[dayId].exercises.push(ex);
            }
            save();
            closeModal();
            renderPanel();
        }

        // Close modal on overlay click
        document.getElementById('modal').addEventListener('click', function (e) {
            if (e.target === this) closeModal();
        });

        // Enter = save on modal
        document.getElementById('modal').addEventListener('keydown', e => {
            if (e.key === 'Escape') closeModal();
        });

        // ─── INIT ────────────────────────────────────────────────────────────────────
        document.getElementById('dateStr').textContent = new Date().toLocaleDateString('es-ES', {
            weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
        });

        render();
    </script>
</body>

</html>
